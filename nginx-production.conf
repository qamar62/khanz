# =======================
# Khanz Restaurant - Nginx Configuration
# =======================

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

# =======================
# Upstream definitions
# =======================
upstream frontend {
    server localhost:3000;
    keepalive 32;
}

upstream backend {
    server localhost:8000;
    keepalive 32;
}

# =======================
# Main server block
# =======================
server {
    listen 80;
    listen [::]:80;
    server_name khanz.qaam.work www.khanz.qaam.work;
    
    # =====================
    # Performance Optimizations
    # =====================
    
    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;
    gzip_min_length 256;
    gzip_disable "msie6";
    
    # Client settings
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    
    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;
    
    # Buffer sizes
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    output_buffers 1 32k;
    postpone_output 1460;

    # -----------------------
    # Security headers
    # -----------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com https://www.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https: ws: wss:;" always;

    # -----------------------
    # Next.js static files
    # -----------------------
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Connection "";

        proxy_intercept_errors off;
        proxy_hide_header Content-Security-Policy;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Access-Control-Allow-Origin "*" always;
        
        # Aggressive caching for static assets
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        
        # Enable compression
        gzip on;
        gzip_types text/css application/javascript text/javascript application/json;
        gzip_vary on;
        
        # Disable access log for performance
        access_log off;
        
        # Enable TCP optimizations
        tcp_nodelay on;
        tcp_nopush on;
    }

    # -----------------------
    # Next.js other /_next routes
    # -----------------------
    location /_next/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        proxy_intercept_errors off;
        proxy_hide_header Content-Security-Policy;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # -----------------------
    # Django static files
    # -----------------------
    location /static/ {
        alias /var/www/khanz/staticfiles/;
        
        # Proper MIME types
        types {
            text/css                              css;
            application/javascript                js;
            image/svg+xml                         svg svgz;
            image/png                             png;
            image/jpeg                            jpg jpeg;
            image/gif                             gif;
            image/webp                            webp;
            image/x-icon                          ico;
            font/woff                             woff;
            font/woff2                            woff2;
            font/ttf                              ttf;
            font/otf                              otf;
        }
        
        try_files $uri =404;
        
        # Aggressive cache control
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        
        access_log off;
        
        # Compression
        gzip on;
        gzip_types text/css application/javascript text/javascript application/json image/svg+xml font/woff font/woff2;
        gzip_min_length 256;
        gzip_vary on;
        gzip_comp_level 6;
        
        tcp_nodelay on;
        tcp_nopush on;
        
        # File cache
        open_file_cache max=1000 inactive=20s;
        open_file_cache_valid 30s;
        open_file_cache_min_uses 2;
        open_file_cache_errors on;
    }

    # -----------------------
    # Media files
    # -----------------------
    location /media/ {
        alias /var/www/khanz/media/;
        
        # Images
        location ~* \.(?:jpg|jpeg|gif|png|ico|webp|avif|svg)$ {
            expires 365d;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            access_log off;
            
            gzip on;
            gzip_types image/svg+xml;
            
            tcp_nodelay on;
            tcp_nopush on;
            
            open_file_cache max=1000 inactive=20s;
            open_file_cache_valid 30s;
            open_file_cache_min_uses 2;
            open_file_cache_errors on;
        }
        
        # Default for other media
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
    }

    # -----------------------
    # API endpoints
    # -----------------------
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # -----------------------
    # Django admin
    # -----------------------
    location /admin/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts for admin operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # -----------------------
    # Main frontend route (must be last)
    # -----------------------
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;

        # Do not cache SSR HTML
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # -----------------------
    # Error pages
    # -----------------------
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
